<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="12" viewBox="0 0 1200 12" fill="none" role="presentation">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="5" width="1200" height="2" rx="1" fill="url(#line)"/>
  <rect x="0" y="5" width="220" height="2" rx="1" fill="url(#shine)">
    <animate attributeName="x" values="-220;1200" dur="4s" repeatCount="indefinite"/>
  </rect>
  <circle cx="600" cy="6" r="4" fill="#8B5CF6">
    <animate attributeName="r" values="3;5;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
