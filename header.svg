<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" fill="none" role="img" aria-label="Heghine Azatyan - React Native Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5">
        <animate attributeName="stop-color" values="#4F46E5;#7C3AED;#DB2777;#4F46E5" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#DB2777;#4F46E5;#7C3AED" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#DB2777">
        <animate attributeName="stop-color" values="#DB2777;#4F46E5;#7C3AED;#DB2777" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect width="1200" height="250" rx="18"/></clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="250" fill="url(#bg)"/>
    <rect width="1200" height="250" fill="url(#glow)"/>

    <!-- faint grid dots -->
    <g fill="#ffffff" fill-opacity="0.06">
      <circle cx="60"  cy="40" r="2"/><circle cx="140" cy="40" r="2"/><circle cx="220" cy="40" r="2"/>
      <circle cx="60"  cy="210" r="2"/><circle cx="140" cy="210" r="2"/><circle cx="1140" cy="40" r="2"/>
      <circle cx="1060" cy="40" r="2"/><circle cx="1140" cy="210" r="2"/><circle cx="1060" cy="210" r="2"/>
    </g>

    <!-- spinning React-style atom, left -->
    <g transform="translate(190,125)">
      <circle r="6" fill="#ffffff"/>
      <g fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5">
        <g>
          <ellipse rx="46" ry="17"/>
          <ellipse rx="46" ry="17" transform="rotate(60)"/>
          <ellipse rx="46" ry="17" transform="rotate(120)"/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- spinning React-style atom, right -->
    <g transform="translate(1010,125)">
      <circle r="6" fill="#ffffff"/>
      <g fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5">
        <g>
          <ellipse rx="46" ry="17"/>
          <ellipse rx="46" ry="17" transform="rotate(60)"/>
          <ellipse rx="46" ry="17" transform="rotate(120)"/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- animated waves -->
    <path fill="#ffffff" fill-opacity="0.08" d="M0 185 C 200 150 400 220 600 185 C 800 150 1000 220 1200 185 L1200 250 L0 250 Z">
      <animate attributeName="d"
        values="M0 185 C 200 150 400 220 600 185 C 800 150 1000 220 1200 185 L1200 250 L0 250 Z;
                M0 185 C 200 220 400 150 600 185 C 800 220 1000 150 1200 185 L1200 250 L0 250 Z;
                M0 185 C 200 150 400 220 600 185 C 800 150 1000 220 1200 185 L1200 250 L0 250 Z"
        dur="8s" repeatCount="indefinite"/>
    </path>
    <path fill="#ffffff" fill-opacity="0.13" d="M0 205 C 250 178 450 232 700 205 C 900 182 1050 228 1200 205 L1200 250 L0 250 Z">
      <animate attributeName="d"
        values="M0 205 C 250 178 450 232 700 205 C 900 182 1050 228 1200 205 L1200 250 L0 250 Z;
                M0 205 C 250 232 450 178 700 205 C 900 228 1050 182 1200 205 L1200 250 L0 250 Z;
                M0 205 C 250 178 450 232 700 205 C 900 182 1050 228 1200 205 L1200 250 L0 250 Z"
        dur="6s" repeatCount="indefinite"/>
    </path>

    <!-- name + subtitle -->
    <g filter="url(#soft)">
      <text x="600" y="112" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="1.5">
        Heghine Azatyan
        <animate attributeName="opacity" values="0;1" dur="1.4s" fill="freeze"/>
      </text>
    </g>

    <!-- animated accent underline -->
    <rect x="440" y="128" width="320" height="3" rx="1.5" fill="url(#accent)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>

    <text x="600" y="162" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.94" letter-spacing="3.5">
      REACT NATIVE DEVELOPER
      <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
    </text>
    <text x="600" y="190" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#ffffff" fill-opacity="0.8" letter-spacing="2">
      iOS &amp; Android  ·  TypeScript  ·  Yerevan, Armenia
      <animate attributeName="opacity" values="0;1" dur="2.6s" fill="freeze"/>
    </text>
  </g>
</svg>
